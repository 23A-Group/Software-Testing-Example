name: Java CI for CentOS 7 Match

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-20.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 8
      uses: actions/setup-java@v4
      with:
        java-version: '8' 
        distribution: 'temurin'
        cache: 'maven'

    - name: Check Environment
      run: |
        java -version
        mvn -version

    - name: Run Tests
      run: mvn test
